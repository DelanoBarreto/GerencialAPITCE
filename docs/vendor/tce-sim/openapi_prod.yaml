openapi: 3.0.1
info:
  title: API de Dados Abertos do SIM
  description: 'Acesse e utilize os dados públicos do Tribunal de Contas do Estado do Ceará (TCE Ceará) de forma simples e
    automatizada.


    ## O que é essa API?


    A API do SIM permite que você conecte seus sistemas diretamente aos dados do TCE Ceará.


    **Use para:**


    1. Criar aplicações

    2. Fazer análises

    3. Automatizar consultas de dados públicos


    ## Como começar


    Para fazer uma requisição, utilize a URL base:


    `https://api-dados-abertos.tce.ce.gov.br/sim/metodo?campo1=valor1&campo2=valor2`


    ## Documentação completa


    Consulte exemplos, parâmetros e métodos disponíveis:


    [https://www.tce.ce.gov.br/municipios/sim/documentacao-e-programas](https://www.tce.ce.gov.br/municipios/sim/documentacao-e-programas)


    ## Limites e paginação


    A API tem dois limites:


    - **Frequência:** máximo 1000 requisições por segundo

    - **Volume:** máximo 1000 registros por requisição


    Acesso permitido apenas para IPs no Brasil.


    Para acessar mais de 1000 registros, use `$start_index`:


    - Primeiros 1000 registros: `$start_index=0`

    - Próximos 1000 (1001-2000): `$start_index=1000`

    - Próximos 1000 (2001-3000): `$start_index=2000`


    ## Autenticação


    Utilize o botão **Autorizar** abaixo para acessar endpoints protegidos.

    '
